<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Gravity Tech</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <a href="index.html" style="text-decoration:none">
        <span class="logo-title">Gravity Tech 💻</span>
      </a>
    </div>
  </header>

  <main class="auth-page-container">
    <div class="auth-card">
      <h2 class="auth-title">📋 Crear Cuenta</h2>
      
      <div class="auth-error-msg" id="register-error"></div>

      <div class="auth-field">
        <label for="register-name">Nombre completo</label>
        <input type="text" id="register-name" placeholder="Tu nombre" autocomplete="name">
        <span class="field-error">El nombre es obligatorio.</span>
      </div>

      <div class="auth-field">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" placeholder="tu@email.com" autocomplete="email">
        <span class="field-error">Ingresa un email válido.</span>
      </div>

      <div class="auth-field">
        <label for="register-password">Contraseña</label>
        <input type="password" id="register-password" placeholder="••••••••" autocomplete="new-password">
        <span class="field-error">Mínimo 6 caracteres.</span>
      </div>

      <button class="auth-submit-btn" id="register-submit-btn">Registrarse</button>

      <hr class="auth-divider">

      <p class="auth-switch">
        ¿Ya tienes cuenta?
        <a href="login.html">Inicia sesión aquí</a>
      </p>
      
      <p class="auth-switch">
        <a href="index.html">⬅ Volver al inicio</a>
      </p>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const originalHandleRegister = handleRegister;
    window.handleRegister = async () => {
      await originalHandleRegister();
      if (auth.isLoggedIn()) {
        window.location.href = 'index.html';
      }
    };
    
    document.getElementById('register-submit-btn').onclick = window.handleRegister;
  </script>
</body>
</html>
