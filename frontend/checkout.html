<!--
  =========================================================
  checkout.html — Proceso de pago
  =========================================================

  DESCRIPCIÓN:
    Formulario de cierre de compra. Muestra el resumen del pedido
    (items del carrito + total) y un selector de método de pago.
    Al confirmar, crea la orden en el backend y vacía el carrito.

  FLUJO:
    1. Mostrar resumen: llamar a api.getCart() para traer los items.
    2. Usuario elige método de pago: 'card' | 'cash' | 'transfer'.
    3. Al confirmar: llamar a api.checkout({ payment_method }).
    4. Si la respuesta es exitosa → redirigir a index.html con mensaje.

  CONEXIÓN CON EL BACKEND:
    1. Resumen del carrito:
         const { items } = await api.getCart();
         → GET http://localhost:3000/api/cart
         → Header requerido: Authorization: Bearer <JWT>

    2. Confirmar compra (crea orden + pago + vacía carrito):
         const { order } = await api.checkout({ payment_method: 'card' });
         → POST http://localhost:3000/api/orders/checkout
         → Header requerido: Authorization: Bearer <JWT>
         → Body: { "payment_method": "card" }

  SCRIPTS A INCLUIR (en este orden):
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
-->
