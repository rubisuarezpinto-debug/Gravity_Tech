<!--
  =========================================================
  product.html — Detalle de producto
  =========================================================

  DESCRIPCIÓN:
    Muestra la información completa de un producto individual:
    imagen grande, nombre, descripción, precio, stock disponible
    y botón "Agregar al carrito".

  CÓMO OBTENER EL ID DEL PRODUCTO:
    const id = utils.getQueryParam('id');
    → La URL esperada es: product.html?id=5

  CONEXIÓN CON EL BACKEND:
    1. Obtener datos del producto:
         const { product } = await api.getProduct(id);
         → GET http://localhost:3000/api/products/:id

    2. Agregar al carrito:
         await api.addToCart({ product_id: product.id, quantity });
         → POST http://localhost:3000/api/cart
         → Header requerido: Authorization: Bearer <JWT>

  SCRIPTS A INCLUIR (en este orden):
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
-->
