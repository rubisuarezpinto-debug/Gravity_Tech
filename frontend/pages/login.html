<!--
  =========================================================
  login.html — Inicio de sesión
  =========================================================

  DESCRIPCIÓN:
    Formulario con campos email y contraseña. Al autenticarse
    correctamente, guarda el JWT y datos del usuario en
    localStorage y redirige a index.html.

  CAMPOS DEL FORMULARIO:
    - email    (type="email", requerido)
    - password (type="password", requerido)

  CONEXIÓN CON EL BACKEND:
    1. Enviar credenciales:
         const { user, token } = await api.login({ email, password });
         → POST http://localhost:3000/api/auth/login
         → Body: { "email": "...", "password": "..." }

    2. Guardar sesión y redirigir:
         auth.setSession(token, user);
         window.location.href = 'index.html';

    3. Manejo de error (credenciales incorrectas):
         El backend responde con status 401 y { message: "Credenciales incorrectas" }
         → Mostrar mensaje con utils.showAlert(err.message)

  SCRIPTS A INCLUIR (en este orden):
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
-->
