<!--
  =========================================================
  admin.html — Panel de Administrador
  =========================================================

  DESCRIPCIÓN:
    Dashboard exclusivo para usuarios con rol 'admin'.
    Permite gestionar (CRUD) productos, ver la lista de todos los
    usuarios y gestionar todas las órdenes (verlas y cambiar su estado).

  CONEXIÓN CON EL BACKEND Y SEGURIDAD:
    1. Proteger la ruta al cargar la página:
         auth.requireAdmin();  // redirige si no hay token o no es admin

    2. Gestionar Productos:
         - Crear:   POST   http://localhost:3000/api/products
         - Editar:  PUT    http://localhost:3000/api/products/:id
         - Borrar:  DELETE http://localhost:3000/api/products/:id
         → Requieren: Authorization: Bearer <JWT>

    3. Listar Usuarios:
         const { users } = await api.adminGetUsers();
         → GET http://localhost:3000/api/admin/users
         → Requieren: Authorization: Bearer <JWT>

    4. Listar y Actualizar Órdenes:
         const { orders } = await api.adminGetOrders();
         await api.adminUpdateOrderStatus(order.id, 'shipped');
         → GET   http://localhost:3000/api/admin/orders
         → PATCH http://localhost:3000/api/admin/orders/:id/status
         → Requieren: Authorization: Bearer <JWT>

  SCRIPTS A INCLUIR (en este orden):
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
-->
