<!--
  =========================================================
  register.html — Registro de usuario
  =========================================================

  DESCRIPCIÓN:
    Formulario para crear una nueva cuenta. Requiere nombre, email
    y contraseña. Al registrar exitosamente, el backend retorna
    el usuario y el token (login automático).

  CAMPOS DEL FORMULARIO:
    - name     (type="text", requerido)
    - email    (type="email", requerido)
    - password (type="password", minlength="6", requerido)

  CONEXIÓN CON EL BACKEND:
    1. Enviar datos de registro:
         const { user, token } = await api.register({ name, email, password });
         → POST http://localhost:3000/api/auth/register
         → Body: { "name": "...", "email": "...", "password": "..." }

    2. Guardar sesión y redirigir (login automático):
         auth.setSession(token, user);
         window.location.href = 'index.html';

    3. Manejo de errores (ej. email ya existe):
         El backend responderá con status 409 y un mensaje.
         → Mostrar mensaje con utils.showAlert(err.message)

  SCRIPTS A INCLUIR (en este orden):
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
-->
