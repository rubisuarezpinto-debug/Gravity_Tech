<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña | Gravity Tech</title>
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/main.css">
  <link rel="stylesheet" href="css/features/auth.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <a href="index.html" style="text-decoration:none">
        <span class="logo-title">Gravity Tech 💻</span>
      </a>
    </div>
  </header>

  <main class="auth-page-container">
    <div class="auth-card" id="form-card">
      <h2 class="auth-title">🔑 Recuperar contraseña</h2>

      <p style="font-size:var(--font-size-sm);color:var(--gt-lavender);margin:0;">
        Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña.
      </p>

      <div class="auth-error-msg" id="forgot-error"></div>
      <div class="auth-error-msg" id="forgot-success" style="background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:#4ade80;"></div>

      <div class="auth-field">
        <label for="forgot-email">Email</label>
        <input type="email" id="forgot-email" placeholder="tu@email.com" autocomplete="email">
        <span class="field-error">Ingresa un email válido.</span>
      </div>

      <button class="auth-submit-btn" id="forgot-submit-btn">Enviar enlace</button>

      <hr class="auth-divider">

      <p class="auth-switch">
        <a href="login.html">⬅ Volver a iniciar sesión</a>
      </p>
    </div>
  </main>

  <script src="js/core/config.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/features/auth.js"></script>
  <script src="js/core/api.js"></script>
  <script>
    const emailEl = document.getElementById('forgot-email');
    const btn     = document.getElementById('forgot-submit-btn');
    const errorEl = document.getElementById('forgot-error');
    const successEl = document.getElementById('forgot-success');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.toggle('visible', !!msg);
      successEl.classList.remove('visible');
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.classList.add('visible');
      errorEl.classList.remove('visible');
    }

    async function doForgotPassword() {
      showError('');
      const email = emailEl.value.trim();

      if (!email || !email.includes('@')) {
        emailEl.classList.add('error');
        return;
      }
      emailEl.classList.remove('error');

      btn.disabled    = true;
      btn.textContent = 'Enviando...';

      try {
        await api.forgotPassword(email);
        showSuccess('Si ese correo está registrado, recibirás el enlace en breve. Revisa tu bandeja de entrada.');
        emailEl.value = '';
      } catch (err) {
        showError(err.message || 'Error al enviar el correo. Intenta de nuevo.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Enviar enlace';
      }
    }

    btn.onclick = doForgotPassword;
    emailEl.onkeydown = (e) => { if (e.key === 'Enter') doForgotPassword(); };
  </script>
</body>
</html>
