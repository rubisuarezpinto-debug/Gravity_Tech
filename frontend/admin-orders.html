<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos | Admin Gravity Tech</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/orders.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <a href="index.html" style="text-decoration:none">
        <span class="logo-title">Gravity Tech 💻</span>
      </a>
    </div>
    <div class="actions">
       <a href="admin-products.html" class="btn-admin">⚙ Gestionar Productos</a>
       <a href="index.html" class="btn-logout">Inicio</a>
    </div>
  </header>

  <main class="admin-page-container">
    <div class="admin-header-title">
      <h1>📦 Historial de Órdenes</h1>
      <button class="orders-close-btn" id="orders-close-btn">Volver</button>
    </div>

    <div class="orders-body">
      <!-- Estadísticas -->
      <div class="orders-stats">
        <div class="stat-card">
          <span class="stat-label">Total Órdenes</span>
          <span class="stat-value" id="stat-total-orders">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Productos</span>
          <span class="stat-value" id="stat-total-products">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Ventas Totales</span>
          <span class="stat-value" id="stat-total-sales">—</span>
        </div>
      </div>

      <!-- Buscador -->
      <div class="orders-search">
        <input type="text" id="orders-search-input" placeholder="Buscar por email de cliente...">
        <button class="btn-orders-search" id="btn-orders-search">🔵 Buscar</button>
        <button class="btn-orders-all" id="btn-orders-all">✖ Todas</button>
      </div>

      <!-- Lista de órdenes -->
      <div class="orders-list" id="orders-list">
        <p class="orders-empty">Cargando órdenes del sistema...</p>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ordersAdmin.js"></script>
</body>
</html>
